name: QEMU

on: [push, pull_request, workflow_dispatch]

jobs:
  qemu:
    name: QEMU
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Pull images
      run: |
        docker pull multiarch/qemu-user-static
        docker pull quay.io/pypa/manylinux2014_aarch64:latest
        docker pull quay.io/pypa/manylinux2014_ppc64le:latest
        docker pull quay.io/pypa/manylinux2014_s390x:latest
    - name: Install QEMU
      run: |
        docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - name: Run all images
      run: |
        docker run --rm quay.io/pypa/manylinux2014_aarch64 uname -a
        docker run --rm quay.io/pypa/manylinux2014_ppc64le uname -a
        docker run --rm quay.io/pypa/manylinux2014_s390x uname -a